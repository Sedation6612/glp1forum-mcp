# The selftest is deliberately not run here: it makes live requests to a Cloudflare-protected site,
# and Linux curl's TLS fingerprint gets 403s where Windows curl passes. It would be permanently red.
# Run it locally instead. CI only checks the two things that are deterministic and offline.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # dist/index.mjs is committed and is what both install channels execute.
      # A rebuild must produce no diff, or the shipped bundle is stale.
      - run: npm run build
      - name: dist/ is in sync with src/
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error file=dist/index.mjs::dist/ is stale — run 'npm run build' and commit dist/"
            exit 1
          fi

      # The version lives in 5 hand-edited files. Nothing regenerates them.
      - name: versions agree across all 5 files
        run: |
          V=$(node -p "require('./package.json').version")
          echo "package.json version: $V"
          fail=0
          check() {
            if ! grep -qF "$2" "$1"; then
              echo "::error file=$1::expected $2 (package.json says $V)"
              fail=1
            fi
          }
          check manifest.json                       "\"version\": \"$V\""
          check .claude-plugin/plugin.json          "\"version\": \"$V\""
          check .claude-plugin/marketplace.json     "\"version\": \"$V\""
          check src/index.js                        "version: \"$V\""
          exit $fail
